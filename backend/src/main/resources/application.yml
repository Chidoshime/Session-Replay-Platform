spring:
  application:
    name: session-replay-backend
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/session_replay_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    # Проверка соединения при старте и перед использованием
    hikari:
      connection-timeout: 10000 # 10 секунд на ожидание подключения
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1
      validation-timeout: 5000
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

server:
  port: 8080

logging:
  level:
    com.sessionreplay: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

session:
  replay:
    api-key: ${SESSION_REPLAY_API_KEY:}
    allowed-origin: ${SESSION_REPLAY_ALLOWED_ORIGIN:http://localhost:3000}
    buffer-size: ${SESSION_REPLAY_BUFFER_SIZE:100}
    flush-interval-ms: ${SESSION_REPLAY_FLUSH_INTERVAL_MS:5000}
    max-session-duration-ms: ${SESSION_REPLAY_MAX_SESSION_DURATION_MS:3600000}
